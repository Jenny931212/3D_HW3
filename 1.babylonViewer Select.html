<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babylon Viewer Select</title>

    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

    <style>
        body {
            margin: 0;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #dbeafe, #f0f9ff);
            font-family: Arial, sans-serif;
        }

        .container {
            width: 900px;
            max-width: 92%;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            padding: 30px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #ddd;
        }

        .control-bar {
            margin-bottom: 20px;
        }

        select {
            padding: 10px 14px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background-color: #f8fafc;
            color: #333;
            outline: none;
            min-width: 240px;
        }

        select:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
        }

        .viewer-box {
            width: 100%;
            height: 520px;
            border-radius: 12px;
            overflow: hidden;
            background-color: #f8fafc;
            box-shadow: inset 0 0 0 1px #e5e7eb;
        }

        babylon {
            width: 100%;
            height: 100%;
            display: block;
        }

        .note {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;

            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;

            transition: 0.2s ease;
        }

        .back-btn:hover {
            background-color: #2563eb;
        }
    </style>

    <script>
        function loadit(modelUrl, modelName) {
            if (modelUrl) {
                let viewer = BabylonViewer.viewerManager.getViewerById('viewerID');
                viewer.loadModel(modelUrl);

                const note = document.getElementById('model-note');
                note.textContent = '目前顯示模型：' + modelName;
            }
        }
    </script>
</head>

<body>
    <div class="container">
        <h1>🧍 Babylon Viewer Select</h1>
        <div class="subtitle">選擇不同模型進行展示</div>

        <hr>

        <div class="control-bar">
            <select onchange="loadit(this.value, this.options[this.selectedIndex].text)">
                <option value="./models/zoey.glb">Zoey</option>
                <option value="./models/mira.glb">Mira</option>
                <option value="./models/rumi.glb">Rumi</option>
                <option value="./models/Cat.glb">自己掃描的炸蝦貓貓</option>
            </select>
        </div>

        <div class="viewer-box">
            <babylon
                id="viewerID"
                model="./models/zoey.glb"
                camera-orbit="0deg 75deg 3m"
                auto-rotate>
            </babylon>
        </div>

        <div class="note" id="model-note">
            目前顯示模型：Zoey
        </div>

        <a class="back-btn" href="index.html">⬅ 返回首頁</a>
    </div>
</body>
</html>
