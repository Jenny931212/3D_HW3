<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babylon Viewer Basic</title>

    <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

    <style>
        body {
            margin: 0;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #dbeafe, #f0f9ff);
            font-family: Arial, sans-serif;
        }

        .container {
            width: 900px;
            max-width: 92%;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            padding: 30px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #ddd;
        }

        .viewer-box {
            width: 100%;
            height: 520px;
            border-radius: 12px;
            overflow: hidden;
            background-color: #f8fafc;
            box-shadow: inset 0 0 0 1px #e5e7eb;
        }

        babylon {
            width: 100%;
            height: 100%;
            display: block;
        }

        .note {
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;

            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;

            transition: 0.2s ease;
        }

        .back-btn:hover {
            background-color: #2563eb;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🧊 Babylon Viewer Basic</h1>
        <div class="subtitle">基礎模型展示頁面</div>

        <hr>

        <div class="viewer-box">
            <babylon model="./models/zoey_kpop_headphones.glb"></babylon>
        </div>

        <div class="note">
            目前載入的模型檔：zoey_kpop_headphones.glb
        </div>

        <a class="back-btn" href="index.html">⬅ 返回首頁</a>
    </div>
</body>
</html>
