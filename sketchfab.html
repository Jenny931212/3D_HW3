<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Sketchfab Viewer</title>

    <style>
        body {
            margin: 0;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #dbeafe, #f0f9ff);
            font-family: Arial, sans-serif;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);

            width: 800px;
            max-width: 90%;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        .viewer {
            margin: 20px 0;
        }

        iframe {
            width: 100%;
            height: 480px;
            border-radius: 10px;
            border: none;
        }

        .back-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;

            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;

            transition: 0.2s;
        }

        .back-btn:hover {
            background-color: #2563eb;
        }

        .credit {
            font-size: 12px;
            color: gray;
            margin-top: 10px;
        }

        .credit a {
            color: #3b82f6;
            text-decoration: none;
        }

        .credit a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🎭 Sketchfab Model</h1>
        <p>模型名稱：Angry</p>

        <div class="viewer">
            <iframe 
                title="Angry"
                allowfullscreen
                allow="autoplay; fullscreen; xr-spatial-tracking"
                src="https://sketchfab.com/models/7af9c069f77e431790e6d79babc8b573/embed">
            </iframe>
        </div>

        <!-- 作者資訊（整理過） -->
        <div class="credit">
            Model by 
            <a href="https://sketchfab.com/jiayen" target="_blank">jiayen</a> 
            on 
            <a href="https://sketchfab.com" target="_blank">Sketchfab</a>
        </div>

        <!-- 返回首頁 -->
        <a class="back-btn" href="index.html">⬅ 返回首頁</a>

    </div>

</body>
</html>
